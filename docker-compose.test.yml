version: '3.8'

services:
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-test-chromadb
    ports:
      - "8001:8000"
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    volumes:
      - chromadb_test_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag-test-network

  rag-service:
    image: rag-service:latest
    container_name: rag-test-service
    ports:
      - "8000:8000"
    environment:
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-openai-api-key}
      
      # RabbitMQ Configuration (External MQ)
      # Update these values to match your friend's RabbitMQ setup
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@localhost:5672/}
      
      # ChromaDB Configuration (using containerized ChromaDB)
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      
      # Vector Store Configuration (fallback for local file-based)
      - CHROMA_PERSIST_DIRECTORY=${CHROMA_PERSIST_DIRECTORY:-./chroma_db}
      
      # API Configuration
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
    depends_on:
      - chromadb
      
    volumes:
      # Mount chroma database for persistence (fallback)
      - ./chroma_db:/app/chroma_db
      
    restart: unless-stopped
    
    networks:
      - rag-test-network
    
    # Optional: Add resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

volumes:
  chromadb_test_data:

networks:
  rag-test-network:
    driver: bridge